<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SHL Assessment Recommender</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --brand: #d71920;
      --brand-dark: #a91118;
      --user: #173b57;
      --agent: #ffffff;
      --focus: rgba(215, 25, 32, 0.2);
      --shadow: 0 18px 50px rgba(28, 39, 49, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    .shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      font-weight: 800;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #1e6b4c;
      font-size: 13px;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #21a366;
    }

    main {
      display: grid;
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: calc(100vh - 145px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow-y: auto;
      padding: 22px;
      scroll-behavior: smooth;
    }

    .message {
      display: grid;
      gap: 8px;
      width: min(760px, 100%);
    }

    .message.user {
      align-self: flex-end;
      justify-items: end;
    }

    .message.assistant {
      align-self: flex-start;
      justify-items: start;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .bubble {
      max-width: 100%;
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .user .bubble {
      background: var(--user);
      color: white;
    }

    .assistant .bubble {
      border: 1px solid var(--line);
      background: var(--agent);
      color: var(--ink);
    }

    .recommendations {
      display: grid;
      gap: 12px;
      width: 100%;
      margin-top: 10px;
    }

    .recommendations-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      font-size: 14px;
    }

    .recommendations-table thead {
      background: #f0f1f3;
      border-bottom: 2px solid var(--line);
    }

    .recommendations-table th {
      padding: 12px;
      text-align: left;
      font-weight: 700;
      color: var(--ink);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .recommendations-table td {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }

    .recommendations-table tbody tr:hover {
      background: #fbfcfe;
    }

    .recommendations-table a {
      color: var(--brand-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .recommendations-table a:hover {
      text-decoration: underline;
    }

    .recommendation {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfe;
    }

    .composer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      border-top: 1px solid var(--line);
      padding: 14px;
      background: #fbfcfe;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 150px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 13px;
      color: var(--ink);
      font: inherit;
      line-height: 1.4;
      outline: none;
    }

    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px var(--focus);
    }

    button {
      width: 104px;
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--brand);
      color: white;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    button:hover {
      background: var(--brand-dark);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .typing {
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .status {
        white-space: normal;
      }

      main {
        width: 100%;
        padding: 0;
      }

      .chat-panel {
        min-height: calc(100vh - 109px);
        border-width: 1px 0 0;
        border-radius: 0;
        box-shadow: none;
      }

      .messages {
        padding: 16px;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">SHL</div>
          <div>
            <h1>SHL Assessment Recommender</h1>
            <div class="subtitle">Chat with your local catalog assistant</div>
          </div>
        </div>
        <div class="status" aria-live="polite"><span class="dot"></span><span id="statusText">API ready</span></div>
      </div>
    </header>

    <main>
      <section class="chat-panel" aria-label="Chat">
        <div id="messages" class="messages"></div>
        <form id="chatForm" class="composer">
          <textarea id="messageInput" placeholder="Ask for an assessment, for example: I need a Java test for entry-level developers" autocomplete="off" required></textarea>
          <button id="sendButton" type="submit">Send</button>
        </form>
      </section>
    </main>
  </div>

  <script>
    const messagesEl = document.querySelector("#messages");
    const form = document.querySelector("#chatForm");
    const input = document.querySelector("#messageInput");
    const sendButton = document.querySelector("#sendButton");
    const statusText = document.querySelector("#statusText");

    const conversation = [];

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(role, content, recommendations) {
      const wrapper = document.createElement("article");
      wrapper.className = `message ${role === "user" ? "user" : "assistant"}`;

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = role === "user" ? "You" : "Assistant";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;

      wrapper.append(label, bubble);

      if (recommendations && recommendations.length) {
        const table = document.createElement("table");
        table.className = "recommendations-table";

        const thead = document.createElement("thead");
        const headerRow = document.createElement("tr");
        const headers = ["#", "Name", "Test Type", "Duration", "Languages", "Link"];
        headers.forEach(header => {
          const th = document.createElement("th");
          th.textContent = header;
          headerRow.append(th);
        });
        thead.append(headerRow);
        table.append(thead);

        const tbody = document.createElement("tbody");
        recommendations.forEach((item, idx) => {
          const row = document.createElement("tr");

          const numCell = document.createElement("td");
          numCell.textContent = idx + 1;
          row.append(numCell);

          const nameCell = document.createElement("td");
          nameCell.textContent = item.name;
          row.append(nameCell);

          const typeCell = document.createElement("td");
          typeCell.textContent = item.test_type || "—";
          row.append(typeCell);

          const durationCell = document.createElement("td");
          durationCell.textContent = item.duration || "—";
          row.append(durationCell);

          const langCell = document.createElement("td");
          langCell.textContent = item.languages || "—";
          row.append(langCell);

          const linkCell = document.createElement("td");
          const link = document.createElement("a");
          link.href = item.link;
          link.target = "_blank";
          link.rel = "noreferrer";
          link.textContent = "Open";
          linkCell.append(link);
          row.append(linkCell);

          tbody.append(row);
        });
        table.append(tbody);

        const container = document.createElement("div");
        container.className = "recommendations";
        container.append(table);
        wrapper.append(container);
      }

      messagesEl.append(wrapper);
      scrollToBottom();
    }

    function addTyping() {
      const typing = document.createElement("div");
      typing.id = "typing";
      typing.className = "message assistant";
      typing.innerHTML = '<div class="label">Assistant</div><div class="bubble typing">Thinking...</div>';
      messagesEl.append(typing);
      scrollToBottom();
    }

    function removeTyping() {
      document.querySelector("#typing")?.remove();
    }

    async function sendMessage(content) {
      addMessage("user", content);
      conversation.push({ role: "user", content });
      addTyping();

      sendButton.disabled = true;
      input.disabled = true;
      statusText.textContent = "Generating response";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            messages: conversation,
          })
        });

        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}`);
        }

        const data = await response.json();
        removeTyping();
        addMessage("assistant", data.reply, data.recommendations);
        conversation.push({ role: "assistant", content: data.reply });
        statusText.textContent = "API ready";
      } catch (error) {
        removeTyping();
        addMessage("assistant", "I couldn't reach the chat API. Make sure the FastAPI server is still running, then try again.");
        statusText.textContent = "API error";
        console.error(error);
      } finally {
        sendButton.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const content = input.value.trim();
      if (!content) return;
      input.value = "";
      sendMessage(content);
    });

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    addMessage("assistant", "Tell me the role, seniority, skills, or assessment type you need, and I will recommend matching SHL assessments from the catalog.");
    input.focus();
  </script>
</body>
</html>
